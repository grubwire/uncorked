name: Bundle engine

# Triggered manually after reviewing a new Gcenx release (see engine-update-check.yml).
# Builds, signs (ad-hoc Phase 1), smoke-tests, generates the signed manifest, and
# produces a GitHub Actions artifact. It does NOT publish to R2.
# To publish a validated artifact to data.grubwire.io, run engine-promote-prod.yml.
#
# Requires secret: ENGINE_MANIFEST_SIGNING_KEY (hex Ed25519 seed)
# Phase 2: set IDENTITY, RUNTIME, ENTITLEMENTS for Developer ID signing.

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Re-bundle even if version already matches engine-version.txt'
        type: boolean
        default: false

permissions: {}

env:
  IDENTITY: '-'         # Phase 1: ad-hoc. Phase 2: "Developer ID Application: NAME (ID)"
  RUNTIME: ''           # Phase 2: "--options runtime --timestamp"
  ENTITLEMENTS: ''      # Phase 2: "scripts/engine.entitlements"

jobs:
  bundle:
    runs-on: macos-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Read published engine version
        id: current
        run: |
          VERSION=$(cat engine-version.txt 2>/dev/null | tr -d '[:space:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Fetch latest Gcenx release
        id: gcenx
        run: |
          RESPONSE=$(curl -s -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/Gcenx/macOS_Wine_builds/releases/latest)
          TAG=$(echo "$RESPONSE" | jq -r '.tag_name')
          # Asset priority: wine-stable > wine-staging > wine-devel > any .tar.xz
          STABLE=$(echo "$RESPONSE" | jq -r '[.assets[] | select(.name | endswith(".tar.xz")) | select(.name | contains("wine-stable"))] | .[0].browser_download_url // empty')
          STAGING=$(echo "$RESPONSE" | jq -r '[.assets[] | select(.name | endswith(".tar.xz")) | select(.name | contains("wine-staging"))] | .[0].browser_download_url // empty')
          DEVEL=$(echo "$RESPONSE" | jq -r '[.assets[] | select(.name | endswith(".tar.xz")) | select(.name | contains("wine-devel"))] | .[0].browser_download_url // empty')
          ANY=$(echo "$RESPONSE" | jq -r '[.assets[] | select(.name | endswith(".tar.xz"))] | .[0].browser_download_url // empty')
          URL="${STABLE:-${STAGING:-${DEVEL:-$ANY}}}"
          # Pull the asset's size out of the same API response. The GitHub
          # API itself is authenticated and TLS-protected, so the size is a
          # signed integrity reference we can compare the download against.
          SIZE=$(echo "$RESPONSE" | jq -r --arg url "$URL" '[.assets[] | select(.browser_download_url == $url) | .size] | .[0] // empty')
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "size=${SIZE}" >> "$GITHUB_OUTPUT"

      - name: Check if bundle needed
        id: gate
        env:
          CURRENT: ${{ steps.current.outputs.version }}
          LATEST: ${{ steps.gcenx.outputs.tag }}
          FORCE: ${{ inputs.force }}
        run: |
          if [[ "$CURRENT" == "$LATEST" ]] && [[ "$FORCE" != 'true' ]]; then
            echo "Engine $LATEST already matches engine-version.txt. Use force=true to re-bundle."
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Gcenx archive
        if: steps.gate.outputs.needed == 'true'
        env:
          URL: ${{ steps.gcenx.outputs.url }}
          EXPECTED_SIZE: ${{ steps.gcenx.outputs.size }}
        run: |
          curl -L --fail -o /tmp/wine.tar.xz "$URL"
          # Verify the download matches the size GitHub reported for the
          # release asset. Gcenx doesn't publish per-asset SHA256, so this
          # is a partial-integrity check — it catches truncation, mirror
          # poisoning that doesn't preserve byte count, and accidental URL
          # rewrites, but not same-size payload substitution. The SHA is
          # also logged so the human promoting an engine can pin it in
          # engine-version-sha256.txt in a follow-up if we want stronger
          # guarantees per upgrade.
          ACTUAL_SIZE=$(stat -c%s /tmp/wine.tar.xz 2>/dev/null || stat -f%z /tmp/wine.tar.xz)
          ACTUAL_SHA=$(sha256sum /tmp/wine.tar.xz 2>/dev/null | awk '{print $1}' \
            || shasum -a 256 /tmp/wine.tar.xz | awk '{print $1}')
          echo "Gcenx download: size=${ACTUAL_SIZE} expected=${EXPECTED_SIZE} sha256=${ACTUAL_SHA}"
          if [[ -n "$EXPECTED_SIZE" && "$ACTUAL_SIZE" != "$EXPECTED_SIZE" ]]; then
            echo "::error::Gcenx archive size mismatch (got $ACTUAL_SIZE, expected $EXPECTED_SIZE)"
            exit 1
          fi

      - name: Extract and locate Wine root
        if: steps.gate.outputs.needed == 'true'
        run: |
          mkdir -p /tmp/engine-raw
          tar -xf /tmp/wine.tar.xz -C /tmp/engine-raw
          WINE64=$(find /tmp/engine-raw -name wine64 -path "*/bin/wine64" | head -n 1)
          if [ -z "$WINE64" ]; then
            WINE64=$(find /tmp/engine-raw -name wine -path "*/bin/wine" | head -n 1)
          fi
          WINE_ROOT=$(dirname "$(dirname "$WINE64")")
          mv "$WINE_ROOT" /tmp/engine

      - name: Generate wrapper scripts
        if: steps.gate.outputs.needed == 'true'
        run: bash scripts/generate-wrappers.sh /tmp/engine/bin

      # Patch + selective-rebuild pipeline.
      #
      # Gcenx ships prebuilt binaries. We swap in patched copies of just the
      # files our patch scripts touch — the rest of the engine remains the
      # Gcenx artifact, unchanged and pre-signed. Steps:
      #
      #   1. Apply every scripts/patch-*.py in sorted order against a fresh
      #      Gcenx/wine source clone.
      #   2. Auto-derive the rebuild list from scripts/patches/*.patch
      #      (`+++ b/<path>` lines → make targets via a small mapping).
      #      No hard-coded "build these dylibs" list — adding a new patch
      #      that touches dlls/foo/bar.c automatically extends the build.
      #   3. Configure + build only the derived targets.
      #   4. Swap by basename into /tmp/engine, with .gcenx.bak backups so
      #      the patch is auditable in place.
      #   5. Verify the swapped binaries actually carry the patch (strings
      #      markers for Mach-O; sha-changed-vs-Gcenx for PE — wow64cpu.dll
      #      has no string markers since it's MinGW-cross with no __APPLE__).
      #   6. sign-engine.sh re-signs Mach-O binaries (skips PE — correct).
      #
      # Currently applies: patch-cw20760.py (cpu.c → wow64cpu.dll),
      # patch-cw-signal.py (signal_x86_64.c → ntdll.so),
      # patch-cw-virtual.py (virtual.c → ntdll.so).
      - name: Install Wine build deps
        if: steps.gate.outputs.needed == 'true'
        run: |
          # Apple's bundled bison is 2.3; Wine requires >=3.0.
          # mingw-w64 supplies x86_64-w64-mingw32-gcc for the PE cross.
          brew install bison pkg-config autoconf mingw-w64
          echo "$(brew --prefix bison)/bin" >> "$GITHUB_PATH"
          which x86_64-w64-mingw32-gcc || ls -la "$(brew --prefix mingw-w64)/bin/" | head

      - name: Clone Gcenx/wine source
        if: steps.gate.outputs.needed == 'true'
        run: |
          set -euo pipefail
          TAG="${{ steps.gcenx.outputs.tag }}"
          # Gcenx's wine fork tracks upstream tags. Try the exact tag first;
          # fall back to master if Gcenx hasn't tagged the equivalent yet.
          if git ls-remote --tags https://github.com/Gcenx/wine.git "wine-${TAG}" | grep -q "wine-${TAG}"; then
            git clone --depth=1 --branch "wine-${TAG}" https://github.com/Gcenx/wine.git /tmp/wine-src
          else
            echo "No wine-${TAG} tag in Gcenx/wine, using master."
            git clone --depth=1 --branch master https://github.com/Gcenx/wine.git /tmp/wine-src
          fi
          # Record the commit the patches landed against, so a later mismatch
          # is debuggable from the workflow logs alone.
          git -C /tmp/wine-src log -1 --oneline

      - name: Apply all patch scripts
        if: steps.gate.outputs.needed == 'true'
        run: |
          set -euo pipefail
          # Sorted order is stable per platform; the patches are independent
          # (different files) so order is not load-bearing today, but if a
          # later patch ever depends on another it'll be sorted by filename.
          shopt -s nullglob
          PATCHES=(scripts/patch-*.py)
          if [ ${#PATCHES[@]} -eq 0 ]; then
            echo "::error::No scripts/patch-*.py found — workflow expects at least one."
            exit 1
          fi
          for patch in "${PATCHES[@]}"; do
            echo "=== $patch ==="
            python3 "$patch" /tmp/wine-src
          done

      - name: Derive rebuild list from patch files
        id: rebuild
        if: steps.gate.outputs.needed == 'true'
        run: |
          set -euo pipefail
          # Read every scripts/patches/*.patch, pull the modified source
          # paths from `+++ b/<path>` lines, map each to its make target
          # via the table below. Outputs two space-separated lists:
          #   targets    — make targets to build (e.g. dlls/ntdll/ntdll.so)
          #   artifacts  — built output paths to swap into the engine
          #
          # Implemented in Python (the runner's default /bin/bash is 3.2,
          # no associative arrays). Add a new MAPPING entry whenever a
          # future patch touches a different subsystem.
          OUTPUT=$(python3 - <<'PY'
          import glob, os, re, sys

          # (source-path regex, make target, built artifact)
          MAPPING = [
              (r'dlls/wow64cpu/.*\.c$',          'dlls/wow64cpu/x86_64-windows/wow64cpu.dll', 'dlls/wow64cpu/x86_64-windows/wow64cpu.dll'),
              (r'dlls/ntdll/unix/.*\.c$',        'dlls/ntdll/ntdll.so',                       'dlls/ntdll/ntdll.so'),
              (r'dlls/ntdll/[^/]*\.c$',          'dlls/ntdll/ntdll.so',                       'dlls/ntdll/ntdll.so'),
              (r'dlls/win32u/.*\.c$',            'dlls/win32u/win32u.so',                     'dlls/win32u/win32u.so'),
              (r'dlls/winemac\.drv/.*\.[cm]$',   'dlls/winemac.drv/winemac.so',               'dlls/winemac.drv/winemac.so'),
          ]

          patch_files = sorted(glob.glob('scripts/patches/*.patch'))
          if not patch_files:
              print('::error::scripts/patches/ has no .patch files; rebuild list would be empty.', file=sys.stderr)
              sys.exit(1)

          targets, artifacts, unmapped = [], [], []
          for pf in patch_files:
              with open(pf) as f:
                  for line in f:
                      m = re.match(r'^\+\+\+ b/(.+)$', line.rstrip())
                      if not m:
                          continue
                      path = m.group(1)
                      for pat, tgt, art in MAPPING:
                          if re.match(pat, path):
                              if tgt not in targets:
                                  targets.append(tgt)
                              if art not in artifacts:
                                  artifacts.append(art)
                              break
                      else:
                          unmapped.append(f'{pf}:{path}')

          if unmapped:
              print('::error::Patch touches unmapped source path — extend MAPPING in derive-rebuild step.', file=sys.stderr)
              for u in unmapped:
                  print(f'  {u}', file=sys.stderr)
              sys.exit(1)

          print('TARGETS=' + ' '.join(targets))
          print('ARTIFACTS=' + ' '.join(artifacts))
          PY
          )
          echo "$OUTPUT"
          TARGETS=$(echo "$OUTPUT" | grep '^TARGETS=' | cut -d= -f2-)
          ARTIFACTS=$(echo "$OUTPUT" | grep '^ARTIFACTS=' | cut -d= -f2-)
          echo "Derived make targets: $TARGETS"
          echo "Derived build artifacts: $ARTIFACTS"
          echo "targets=$TARGETS" >> "$GITHUB_OUTPUT"
          echo "artifacts=$ARTIFACTS" >> "$GITHUB_OUTPUT"

      - name: Configure Wine source (PE cross + host x86_64)
        if: steps.gate.outputs.needed == 'true'
        run: |
          set -euo pipefail
          cd /tmp/wine-src
          # Cross-compile to x86_64 so both the PE DLLs and the host-side
          # Mach-O .so files ABI-match the x86_64 Gcenx engine. The macos-
          # latest runner is arm64; --host=x86_64-apple-darwin + clang -arch
          # x86_64 produces x86_64 for both worlds. Optional deps disabled
          # below are not used by the dylibs we rebuild (ntdll, wow64cpu).
          # If a future patch touches a subsystem with deps, drop the
          # corresponding --without flag.
          export CC="clang -arch x86_64"
          export CXX="clang++ -arch x86_64"
          ./configure \
            --host=x86_64-apple-darwin \
            --enable-win64 \
            --disable-tests \
            --without-alsa --without-capi --without-coreaudio --without-cups \
            --without-dbus --without-fontconfig --without-freetype --without-gettext \
            --without-gphoto --without-gnutls --without-gssapi --without-gstreamer \
            --without-inotify --without-krb5 \
            --without-netapi --without-opencl --without-opengl --without-pcap \
            --without-pcsclite --without-pulse --without-sane --without-sdl \
            --without-udev --without-usb --without-v4l2 --without-vulkan \
            --without-x --without-xcomposite --without-xcursor --without-xfixes \
            --without-xinerama --without-xinput --without-xinput2 \
            --without-xrandr --without-xrender --without-xshape --without-xshm \
            --without-xxf86vm 2>&1 | tail -30

      - name: Freeze wineserver protocol version
        if: steps.gate.outputs.needed == 'true'
        run: |
          set -euo pipefail
          cd /tmp/wine-src
          # tools/make_requests regenerates include/wine/server_protocol.h
          # from server/protocol.def and AUTO-BUMPS SERVER_PROTOCOL_VERSION
          # by 1 if the regenerated content differs from what's on disk.
          # Gcenx ships a pre-generated header whose formatting differs
          # slightly from what a fresh tools/make_requests run produces
          # (whitespace / Perl-version drift). So a clean CI build flips
          # the version from 934 to 935, and the resulting ntdll.so can't
          # talk to the Gcenx wineserver we ship (which is still 934).
          #
          # Touching the header makes its mtime newer than protocol.def
          # so make skips the make_requests dependency rule. Safe as long
          # as none of our patches modify protocol.def — they don't today;
          # the smoke test catches it if a future one ever does (mismatch
          # error will reappear, with this comment as the breadcrumb).
          ORIG_VERSION=$(grep "^#define SERVER_PROTOCOL_VERSION " include/wine/server_protocol.h | awk '{print $3}')
          echo "Pinning SERVER_PROTOCOL_VERSION at $ORIG_VERSION (Gcenx wineserver ABI)."
          touch include/wine/server_protocol.h

      - name: Build patched targets
        if: steps.gate.outputs.needed == 'true'
        env:
          MAKE_TARGETS: ${{ steps.rebuild.outputs.targets }}
        run: |
          set -euo pipefail
          cd /tmp/wine-src
          # shellcheck disable=SC2086
          make -j2 $MAKE_TARGETS 2>&1 | tail -40
          # Show what was built so a failed swap is obvious in logs.
          for art in ${{ steps.rebuild.outputs.artifacts }}; do
            if [ ! -f "$art" ]; then
              echo "::error::Expected built artifact missing: $art"
              exit 1
            fi
            ls -la "$art"
            file "$art"
          done

      - name: Swap patched artifacts into engine
        if: steps.gate.outputs.needed == 'true'
        env:
          ARTIFACTS: ${{ steps.rebuild.outputs.artifacts }}
        run: |
          set -euo pipefail
          # For each built artifact, find its match in the engine tree by
          # basename and swap. Backup the Gcenx original as .gcenx.bak so
          # the swap is auditable post-package.
          for art in $ARTIFACTS; do
            base="$(basename "$art")"
            target="$(find /tmp/engine -type f -name "$base" | head -n 1)"
            if [ -z "$target" ]; then
              echo "::error::Engine tree has no $base to swap into."
              exit 1
            fi
            cp "$target" "${target}.gcenx.bak"
            cp "/tmp/wine-src/$art" "$target"
            echo "Replaced $base:"
            shasum -a 256 "$target" "${target}.gcenx.bak"
          done

      - name: Verify patched binaries carry expected markers
        if: steps.gate.outputs.needed == 'true'
        run: |
          set -euo pipefail
          # Mach-O .so files: the patch comments embed unique strings that
          # show up in `strings` output. Each marker corresponds to a
          # specific CW HACK; if the swap dropped the wrong file or the
          # build silently skipped a translation unit, this catches it.
          # Pipe-delimited so the marker text can contain spaces.
          STRING_CHECKS=(
            'ntdll.so|emulated an XGETBV instruction|CW HACK 23427'
            'ntdll.so|faking success|CW HACK 22131'
            'ntdll.so|HACK: write fault on a w|x page|CW HACK 24945'
            'ntdll.so|HACK: exec fault on executable page|CW HACK 25719'
          )
          for row in "${STRING_CHECKS[@]}"; do
            basename="${row%%|*}"
            rest="${row#*|}"
            marker="${rest%|*}"          # everything between first and last |
            label="${rest##*|}"
            target="$(find /tmp/engine -type f -name "$basename" ! -name "*.gcenx.bak" | head -n 1)"
            if [ -z "$target" ]; then
              echo "::error::No $basename in engine tree to verify."
              exit 1
            fi
            if ! strings "$target" | grep -qF "$marker"; then
              echo "::error::$basename missing marker for $label (\"$marker\"). Patch did not land in build."
              exit 1
            fi
            echo "  OK: $basename carries $label marker"
          done

          # PE binaries (MinGW-cross, __APPLE__ undefined → no marker strings).
          # Best available check: the swapped file must differ from the
          # Gcenx original backed up alongside it. Combined with the patch
          # script's source-modification assertion, this proves a patched
          # build was produced and swapped in.
          SHA_CHECKS=(
            'wow64cpu.dll|CW HACK 20760'
          )
          for row in "${SHA_CHECKS[@]}"; do
            basename="${row%%|*}"
            label="${row#*|}"
            target="$(find /tmp/engine -type f -name "$basename" ! -name "*.gcenx.bak" | head -n 1)"
            backup="${target}.gcenx.bak"
            if [ ! -f "$backup" ]; then
              echo "::error::No backup for $basename — swap step did not run?"
              exit 1
            fi
            sha_new="$(shasum -a 256 "$target" | awk '{print $1}')"
            sha_old="$(shasum -a 256 "$backup" | awk '{print $1}')"
            if [ "$sha_new" = "$sha_old" ]; then
              echo "::error::$basename sha unchanged vs Gcenx original — patch did not affect the build."
              exit 1
            fi
            echo "  OK: $basename sha changed for $label ($sha_old -> $sha_new)"
          done

      - name: Strip .gcenx.bak backups and source tree
        if: steps.gate.outputs.needed == 'true'
        run: |
          set -euo pipefail
          # .gcenx.bak files are debugging aids during verification; they
          # should not ship in the engine artifact (bloat + confusion).
          find /tmp/engine -name "*.gcenx.bak" -delete
          rm -rf /tmp/wine-src

      - name: Sign all Mach-O files
        if: steps.gate.outputs.needed == 'true'
        env:
          IDENTITY: ${{ env.IDENTITY }}
          RUNTIME: ${{ env.RUNTIME }}
          ENTITLEMENTS: ${{ env.ENTITLEMENTS }}
        run: bash scripts/sign-engine.sh /tmp/engine

      - name: Boot smoke test
        if: steps.gate.outputs.needed == 'true'
        id: smoke_test
        run: |
          # Initialize a throwaway prefix with Crosswireboot (wraps wineboot).
          # A successful wineboot --init proves the engine can launch on this hardware.
          # That is the only check we need: wineboot initializes Wine internals, so if
          # it passes, the engine is functional. A separate wine64 --version invocation
          # on the same prefix is unreliable due to wineserver timing after wineboot exits.
          WINEPREFIX=$(mktemp -d)
          export WINEPREFIX
          /tmp/engine/bin/Crosswireboot --init || {
            echo "::error::Crosswireboot --init failed -- engine cannot launch. Aborting."
            rm -rf "$WINEPREFIX"
            exit 1
          }
          echo "Smoke test passed: wineboot --init completed successfully."
          rm -rf "$WINEPREFIX"

      - name: Open issue on smoke test failure
        if: failure() && steps.smoke_test.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.gcenx.outputs.tag }}"
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Engine ${TAG} failed smoke test" \
            --body "Engine **${TAG}** downloaded from Gcenx but failed the boot smoke test.

          The engine binary could not launch or \`wineboot --init\` returned an error.
          No artifact was produced. Do not promote this engine to prod.

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Measure uncompressed engine size
        if: steps.gate.outputs.needed == 'true'
        id: sizes
        run: |
          # macOS du uses BSD syntax: -sk gives kibibytes; multiply by 1024 for bytes.
          SIZE=$(du -sk /tmp/engine | awk '{print $1 * 1024}')
          echo "size_bytes=${SIZE}" >> "$GITHUB_OUTPUT"

      - name: Repack as tar.xz
        if: steps.gate.outputs.needed == 'true'
        run: |
          TAG="${{ steps.gcenx.outputs.tag }}"
          cd /tmp && tar -cJf "Crosswire-engine-${TAG}.tar.xz" engine/
          mv "/tmp/Crosswire-engine-${TAG}.tar.xz" /tmp/engine.tar.xz

      - name: Compute SHA-256
        if: steps.gate.outputs.needed == 'true'
        id: sha256
        run: |
          SHA=$(shasum -a 256 /tmp/engine.tar.xz | awk '{print $1}')
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Generate engine-manifest.json
        if: steps.gate.outputs.needed == 'true'
        run: |
          TAG="${{ steps.gcenx.outputs.tag }}"
          SHA="${{ steps.sha256.outputs.sha256 }}"
          SIZE="${{ steps.sizes.outputs.size_bytes }}"
          URL="https://data.grubwire.io/engine/prod/archives/Crosswire-engine-${TAG}.tar.xz"
          printf '{\n  "schemaVersion": 1,\n  "engineVersion": "%s",\n  "upstreamTag": "%s",\n  "url": "%s",\n  "sha256": "%s",\n  "sizeBytes": %s,\n  "minAppVersion": "1.0.0"\n}\n' \
            "$TAG" "$TAG" "$URL" "$SHA" "$SIZE" > /tmp/engine-manifest.json
          cat /tmp/engine-manifest.json

      - name: Install signing dependency
        if: steps.gate.outputs.needed == 'true'
        run: pip3 install cryptography --break-system-packages

      - name: Sign manifest
        if: steps.gate.outputs.needed == 'true'
        env:
          ENGINE_MANIFEST_SIGNING_KEY: ${{ secrets.ENGINE_MANIFEST_SIGNING_KEY }}
        run: bash scripts/sign-manifest.sh /tmp/engine-manifest.json

      - name: Rename archive for upload
        if: steps.gate.outputs.needed == 'true'
        run: |
          TAG="${{ steps.gcenx.outputs.tag }}"
          cp /tmp/engine.tar.xz "/tmp/Crosswire-engine-${TAG}.tar.xz"

      - name: Upload artifact
        if: steps.gate.outputs.needed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: engine-${{ steps.gcenx.outputs.tag }}
          path: |
            /tmp/Crosswire-engine-${{ steps.gcenx.outputs.tag }}.tar.xz
            /tmp/engine-manifest.json
            /tmp/engine-manifest.json.sig
          retention-days: 30

      - name: Open tracking issue
        if: steps.gate.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.gcenx.outputs.tag }}"
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Engine ${TAG} bundled - verify before promoting to prod" \
            --body "Engine **${TAG}** has been built, signed, smoke-tested, and uploaded as a GitHub Actions artifact.

          Verify before promoting to prod:
          - [ ] Fresh install: setup flow downloads and installs engine cleanly
          - [ ] Create a test bottle and run a known-working .exe
          - [ ] DXVK loads correctly
          - [ ] Engine update flow: uninstall engine, relaunch, update offered and installs
          - [ ] When verified, run the **Promote engine to prod** workflow (engine-promote-prod.yml)"
