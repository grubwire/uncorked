name: Bundle and publish engine

# Triggered manually after reviewing a new Gcenx release (see engine-update-check.yml).
# Requires secrets: R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_BUCKET,
#                   ENGINE_MANIFEST_SIGNING_KEY (hex Ed25519 seed)
#
# Phase 2: set IDENTITY, RUNTIME, ENTITLEMENTS for Developer ID signing.

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Re-publish even if version already matches'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

env:
  IDENTITY: '-'         # Phase 1: ad-hoc. Phase 2: "Developer ID Application: NAME (ID)"
  RUNTIME: ''           # Phase 2: "--options runtime --timestamp"
  ENTITLEMENTS: ''      # Phase 2: "scripts/engine.entitlements"

jobs:
  bundle:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read published engine version
        id: current
        run: |
          VERSION=$(cat engine-version.txt 2>/dev/null | tr -d '[:space:]')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Fetch latest Gcenx release
        id: gcenx
        run: |
          RESPONSE=$(curl -s -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/Gcenx/macOS_Wine_builds/releases/latest)
          TAG=$(echo "$RESPONSE" | jq -r '.tag_name')
          # Asset priority: wine-staging > wine-devel > any .tar.xz
          STAGING=$(echo "$RESPONSE" | jq -r '[.assets[] | select(.name | endswith(".tar.xz")) | select(.name | contains("wine-staging"))] | .[0].browser_download_url // empty')
          DEVEL=$(echo "$RESPONSE" | jq -r '[.assets[] | select(.name | endswith(".tar.xz")) | select(.name | contains("wine-devel"))] | .[0].browser_download_url // empty')
          ANY=$(echo "$RESPONSE" | jq -r '[.assets[] | select(.name | endswith(".tar.xz"))] | .[0].browser_download_url // empty')
          URL="${STAGING:-${DEVEL:-$ANY}}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "url=${URL}" >> $GITHUB_OUTPUT

      - name: Skip if already published
        if: |
          steps.current.outputs.version == steps.gcenx.outputs.tag &&
          inputs.force != 'true'
        run: |
          echo "Engine ${{ steps.gcenx.outputs.tag }} is already published. Use force=true to re-publish."
          exit 0

      - name: Download Gcenx archive
        run: |
          curl -L -o /tmp/wine.tar.xz "${{ steps.gcenx.outputs.url }}"

      - name: Extract and locate Wine root
        run: |
          mkdir -p /tmp/engine-raw
          tar -xf /tmp/wine.tar.xz -C /tmp/engine-raw
          WINE64=$(find /tmp/engine-raw -name wine64 -path "*/bin/wine64" | head -1)
          if [ -z "$WINE64" ]; then
            WINE64=$(find /tmp/engine-raw -name wine -path "*/bin/wine" | head -1)
          fi
          WINE_ROOT=$(dirname "$(dirname "$WINE64")")
          mv "$WINE_ROOT" /tmp/engine

      - name: Generate wrapper scripts
        run: bash scripts/generate-wrappers.sh /tmp/engine/bin

      - name: Sign all Mach-O files
        env:
          IDENTITY: ${{ env.IDENTITY }}
          RUNTIME: ${{ env.RUNTIME }}
          ENTITLEMENTS: ${{ env.ENTITLEMENTS }}
        run: bash scripts/sign-engine.sh /tmp/engine

      - name: Repack as tar.xz
        run: cd /tmp && tar -cJf engine.tar.xz engine/

      - name: Compute SHA-256
        id: sha256
        run: |
          SHA=$(shasum -a 256 /tmp/engine.tar.xz | awk '{print $1}')
          echo "sha256=${SHA}" >> $GITHUB_OUTPUT

      - name: Generate manifest.json
        run: |
          TAG="${{ steps.gcenx.outputs.tag }}"
          SHA="${{ steps.sha256.outputs.sha256 }}"
          URL="https://data.grubwire.io/engine/${TAG}/engine.tar.xz"
          printf '{\n  "version": "%s",\n  "url": "%s",\n  "sha256": "%s"\n}\n' \
            "$TAG" "$URL" "$SHA" > /tmp/manifest.json
          cat /tmp/manifest.json

      - name: Sign manifest
        env:
          ENGINE_MANIFEST_SIGNING_KEY: ${{ secrets.ENGINE_MANIFEST_SIGNING_KEY }}
        run: bash scripts/sign-manifest.sh /tmp/manifest.json

      - name: Upload to R2
        # Requires secrets: R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_BUCKET
        # Set up via Checkpoint D (data.grubwire.io / Cloudflare R2 setup)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          TAG: ${{ steps.gcenx.outputs.tag }}
        run: |
          pip install awscli --quiet
          # Version-specific archive (immutable)
          aws s3 cp /tmp/engine.tar.xz \
            "s3://${R2_BUCKET}/engine/${TAG}/engine.tar.xz" \
            --endpoint-url "$R2_ENDPOINT"
          # Manifest and signature (mutable: always the latest)
          for DEST in engine staging/engine; do
            aws s3 cp /tmp/manifest.json \
              "s3://${R2_BUCKET}/${DEST}/manifest.json" \
              --endpoint-url "$R2_ENDPOINT" \
              --content-type "application/json"
            aws s3 cp /tmp/manifest.json.sig \
              "s3://${R2_BUCKET}/${DEST}/manifest.json.sig" \
              --endpoint-url "$R2_ENDPOINT" \
              --content-type "application/octet-stream"
          done

      - name: Update engine-version.txt and push
        run: |
          echo "${{ steps.gcenx.outputs.tag }}" > engine-version.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add engine-version.txt
          git commit -m "Publish engine ${{ steps.gcenx.outputs.tag }}"
          git push

      - name: Open tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Engine ${{ steps.gcenx.outputs.tag }} published - verify before shipping" \
            --body "Engine **${{ steps.gcenx.outputs.tag }}** has been signed and published to data.grubwire.io.

          Verify before shipping a release:
          - [ ] Fresh install: setup flow downloads and installs engine cleanly
          - [ ] Create a test bottle and run a known-working .exe
          - [ ] DXVK loads correctly
          - [ ] Engine update flow: uninstall engine, relaunch, update offered and installs
          - [ ] Ship a release (bump version, tag) when verified"
