name: Release

# Builds, signs (ad-hoc Phase 1), and publishes the Crosswire app.
# The compatibility engine is separately published to data.grubwire.io
# via engine-bundle.yml; it is not bundled here.
#
# Phase 2: set IDENTITY env and add notarize/staple steps.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v1.0.2). Must already exist.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      VERSION: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: Validate VERSION
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.*)?$ ]]; then
            echo "VERSION '$VERSION' does not match expected vMAJOR.MINOR.PATCH[-suffix] form."
            echo "On workflow_dispatch, pass an existing tag like 'v1.0.2'."
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ env.VERSION }}

      - name: Install dependencies
        run: brew install create-dmg swiftlint

      - name: Archive
        run: |
          xcodebuild archive \
            -scheme Crosswire \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Crosswire.xcarchive" \
            CODE_SIGNING_ALLOWED=NO

      - name: Export app
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Crosswire.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ExportOptions-unsigned.plist

      - name: Ad-hoc sign (Phase 1)
        run: |
          APP="$RUNNER_TEMP/export/Crosswire.app"
          # Sign nested bundles inside-out first.
          # No --options runtime: requires a real Developer ID cert; using it
          # with ad-hoc (-) produces a "damaged" signature on Gatekeeper.
          find "$APP" \( -name "*.framework" -o -name "*.dylib" -o -name "*.appex" \) \
            | sort -r \
            | xargs -I{} codesign --force --sign - "{}"
          codesign --force --sign - "$APP"

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Crosswire" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --icon "Crosswire.app" 200 185 \
            --hide-extension "Crosswire.app" \
            --app-drop-link 460 185 \
            "$RUNNER_TEMP/Crosswire-${{ env.VERSION }}.dmg" \
            "$RUNNER_TEMP/export/"
          # Stable filename for the grubwire.io download link
          cp "$RUNNER_TEMP/Crosswire-${{ env.VERSION }}.dmg" "$RUNNER_TEMP/Crosswire.dmg"

      # Always upload the DMG as a workflow artifact so it is recoverable from
      # the run page even if a later publishing step (GitHub release or R2)
      # fails.
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: Crosswire-${{ env.VERSION }}-dmg
          path: ${{ runner.temp }}/Crosswire-${{ env.VERSION }}.dmg
          if-no-files-found: error
          retention-days: 30

      # Publish to GitHub releases before R2 so the draft release exists even
      # if the R2 upload fails for credential or bucket reasons.
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3.0.0
        with:
          draft: true
          generate_release_notes: true
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          files: |
            ${{ runner.temp }}/Crosswire-${{ env.VERSION }}.dmg
            ${{ runner.temp }}/Crosswire.dmg

      - name: Upload DMG to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          pip3 install awscli --break-system-packages --quiet
          # Versioned copy (immutable)
          aws s3 cp "$RUNNER_TEMP/Crosswire-${{ env.VERSION }}.dmg" \
            "s3://${R2_BUCKET}/app/Crosswire-${{ env.VERSION }}.dmg" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "application/x-apple-diskimage"
          # Stable pointer for the grubwire.io download link.
          aws s3 cp "$RUNNER_TEMP/Crosswire.dmg" \
            "s3://${R2_BUCKET}/app/Crosswire.dmg" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "application/x-apple-diskimage" \
            --cache-control "no-cache, no-store, must-revalidate"
