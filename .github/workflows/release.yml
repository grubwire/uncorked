name: Release

# Builds, signs (ad-hoc Phase 1), and publishes the Crosswire app.
# The compatibility engine is separately published to data.grubwire.io
# via engine-bundle.yml; it is not bundled here.
#
# Phase 2: set IDENTITY env and add notarize/staple steps.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v1.0.2). Must already exist.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      VERSION: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: Validate VERSION
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.*)?$ ]]; then
            echo "VERSION '$VERSION' does not match expected vMAJOR.MINOR.PATCH[-suffix] form."
            echo "On workflow_dispatch, pass an existing tag like 'v1.0.2'."
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ env.VERSION }}

      - name: Install dependencies
        run: brew install create-dmg swiftlint

      - name: Archive
        run: |
          xcodebuild archive \
            -scheme Crosswire \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Crosswire.xcarchive" \
            CODE_SIGNING_ALLOWED=NO

      - name: Export app
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Crosswire.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ExportOptions-unsigned.plist

      - name: Ad-hoc sign (Phase 1)
        run: |
          APP="$RUNNER_TEMP/export/Crosswire.app"
          # Sign nested bundles inside-out first.
          # No --options runtime: requires a real Developer ID cert; using it
          # with ad-hoc (-) produces a "damaged" signature on Gatekeeper.
          find "$APP" \( -name "*.framework" -o -name "*.dylib" -o -name "*.appex" \) \
            | sort -r \
            | xargs -I{} codesign --force --sign - "{}"
          codesign --force --sign - "$APP"

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Crosswire" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --icon "Crosswire.app" 200 185 \
            --hide-extension "Crosswire.app" \
            --app-drop-link 460 185 \
            "$RUNNER_TEMP/Crosswire-${{ env.VERSION }}.dmg" \
            "$RUNNER_TEMP/export/"
          # Stable filename for the grubwire.io download link
          cp "$RUNNER_TEMP/Crosswire-${{ env.VERSION }}.dmg" "$RUNNER_TEMP/Crosswire.dmg"

      # Always upload the DMG as a workflow artifact so it is recoverable from
      # the run page even if a later publishing step (GitHub release or R2)
      # fails.
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: Crosswire-${{ env.VERSION }}-dmg
          path: ${{ runner.temp }}/Crosswire-${{ env.VERSION }}.dmg
          if-no-files-found: error
          retention-days: 30

      # Publish to GitHub releases before R2 so the draft release exists even
      # if the R2 upload fails for credential or bucket reasons.
      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          draft: true
          generate_release_notes: true
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          files: |
            ${{ runner.temp }}/Crosswire-${{ env.VERSION }}.dmg
            ${{ runner.temp }}/Crosswire.dmg

      - name: Upload DMG to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          pip3 install awscli --break-system-packages --quiet
          # Versioned copy (immutable)
          aws s3 cp "$RUNNER_TEMP/Crosswire-${{ env.VERSION }}.dmg" \
            "s3://${R2_BUCKET}/app/Crosswire-${{ env.VERSION }}.dmg" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "application/x-apple-diskimage"
          # Stable pointer for the grubwire.io download link.
          aws s3 cp "$RUNNER_TEMP/Crosswire.dmg" \
            "s3://${R2_BUCKET}/app/Crosswire.dmg" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "application/x-apple-diskimage" \
            --cache-control "no-cache, no-store, must-revalidate"

      # Sign the DMG with Sparkle's EdDSA key and commit a new <item> to
      # appcast.xml on main. The in-app "Check for Updates..." menu reads
      # this file. Gated on SPARKLE_PRIVATE_KEY existing so the workflow
      # still succeeds before the secret is configured.
      - name: Publish Sparkle appcast entry
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: env.SPARKLE_PRIVATE_KEY != ''
        run: |
          # Force unbuffered output so log capture sees every line in
          # order; previous v1.1.2 runs failed silently because the
          # default buffering swallowed all stderr before exit.
          exec 2>&1
          set -x
          set -euo pipefail
          echo "::group::resolve build metadata"
          SHORT_VERSION="${VERSION#v}"
          echo "VERSION=$VERSION SHORT_VERSION=$SHORT_VERSION"
          ls -la "$RUNNER_TEMP/export/Crosswire.app/Contents/" || true
          BUILD_NUMBER=$(defaults read \
            "$RUNNER_TEMP/export/Crosswire.app/Contents/Info" CFBundleVersion)
          DMG_PATH="$RUNNER_TEMP/Crosswire-${VERSION}.dmg"
          DMG_URL="https://data.grubwire.io/app/Crosswire-${VERSION}.dmg"
          DMG_LENGTH=$(stat -f%z "$DMG_PATH")
          echo "BUILD_NUMBER=$BUILD_NUMBER DMG_LENGTH=$DMG_LENGTH"
          echo "::endgroup::"

          # Sparkle ships sign_update inside its release tarball.
          echo "::group::install sparkle tools"
          SPARKLE_VERSION="2.6.4"
          curl -sSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            | tar -xJ -C "$RUNNER_TEMP"
          SIGN_UPDATE="$RUNNER_TEMP/bin/sign_update"
          ls -la "$SIGN_UPDATE"
          echo "::endgroup::"

          echo "::group::sign DMG"
          KEY_FILE="$RUNNER_TEMP/sparkle_private.key"
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"

          SIG_OUTPUT=$("$SIGN_UPDATE" -f "$KEY_FILE" "$DMG_PATH")
          rm -f "$KEY_FILE"
          # sign_update output: sparkle:edSignature="..." length="..."
          SIGNATURE=$(printf '%s' "$SIG_OUTPUT" \
            | sed -nE 's/.*edSignature="([^"]+)".*/\1/p')
          if [[ -z "$SIGNATURE" ]]; then
            echo "Failed to extract signature from sign_update output: $SIG_OUTPUT"
            exit 1
          fi
          echo "signature length: ${#SIGNATURE}"
          echo "::endgroup::"

          echo "::group::commit appcast.xml to main"
          WORK="$RUNNER_TEMP/appcast-checkout"
          git clone --depth=1 --branch main \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "$WORK"
          (
            cd "$WORK"
            python3 scripts/update-appcast.py \
              --appcast appcast.xml \
              --version "$SHORT_VERSION" \
              --build "$BUILD_NUMBER" \
              --url "$DMG_URL" \
              --length "$DMG_LENGTH" \
              --signature "$SIGNATURE" \
              --release-notes-url "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${VERSION}"
            git -c user.email="github-actions[bot]@users.noreply.github.com" \
                -c user.name="github-actions[bot]" \
                commit -am "Publish appcast entry for ${VERSION}"
            git push origin main
          )
          echo "::endgroup::"

      - name: Note appcast not published
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        if: env.SPARKLE_PRIVATE_KEY == ''
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'NOTE'
          ### Sparkle appcast NOT published

          No `SPARKLE_PRIVATE_KEY` repo secret is configured. The DMG built
          and uploaded successfully, but `appcast.xml` was not updated, so
          the in-app "Check for Updates..." will not find this release.

          One-time setup:
          1. On the Mac that originally generated the Sparkle key, run
             `generate_keys -x ~/sparkle-private.key` (the binary ships in
             the Sparkle release tarball under `bin/`). The file holds the
             base64-encoded EdDSA private key on a single line.
          2. Add its full contents as a GitHub repo secret named
             `SPARKLE_PRIVATE_KEY` (Settings > Secrets and variables > Actions).
          3. Re-run this workflow (Actions > Release > Re-run failed jobs)
             or push a fresh tag.
          NOTE
