name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: brew install swiftlint create-dmg

      - name: Archive
        run: |
          xcodebuild archive \
            -scheme Uncorked \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Uncorked.xcarchive" \
            CODE_SIGNING_ALLOWED=NO

      - name: Export app
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Uncorked.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ExportOptions-unsigned.plist

      - name: Ad-hoc sign
        run: codesign --force --deep --sign - "$RUNNER_TEMP/export/Uncorked.app"

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Uncorked" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --icon "Uncorked.app" 200 185 \
            --hide-extension "Uncorked.app" \
            --app-drop-link 460 185 \
            "$RUNNER_TEMP/Uncorked-${{ github.ref_name }}.dmg" \
            "$RUNNER_TEMP/export/"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2.3.2
        with:
          draft: true
          generate_release_notes: true
          files: "${{ runner.temp }}/Uncorked-${{ github.ref_name }}.dmg"
