name: CodeQL

# Replaces GitHub's Default Setup, which used the stale Whisky.xcodeproj name.
# Autobuild is replaced with an explicit xcodebuild invocation to avoid project
# name detection issues after the Whisky -> Uncorked rename.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'

permissions:
  security-events: write
  actions: read
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift

      - name: Build
        run: xcodebuild build -scheme Uncorked -configuration Debug CODE_SIGNING_ALLOWED=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
