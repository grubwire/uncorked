name: Notify on CI failure

# Fires whenever a tracked workflow completes with a failure conclusion.
# Opens a GitHub issue so the failure shows up in notifications immediately.
# The issue title contains enough context to act on without opening the run.

on:
  workflow_run:
    workflows:
      - Release
      - Bundle engine
      - Promote engine to prod
      - Check for engine updates
      - Build
      - SwiftLint
      - CodeQL Advanced
    types: [completed]

jobs:
  open-issue:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Ensure ci-failure label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create ci-failure \
            --color D93F0B \
            --description "Opened automatically when a CI workflow fails" \
            --repo "${{ github.repository }}" \
            2>/dev/null || true

      - name: Open or update failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WORKFLOW="${{ github.event.workflow_run.name }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          RUN_URL="${{ github.event.workflow_run.html_url }}"
          SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${SHA:0:7}"

          # Deduplicate: if there is already an open ci-failure issue mentioning
          # this workflow name (title or body), post a comment with the new run
          # instead of opening a second issue. Substring match in JQ so that
          # repurposed/renamed tracker issues still count.
          EXISTING=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --label ci-failure \
            --json number,title,body \
            --jq "[.[] | select((.title + \" \" + .body) | ascii_downcase | contains(\"$(echo "$WORKFLOW" | tr '[:upper:]' '[:lower:]')\"))] | .[0].number // empty")

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" \
              --repo "${{ github.repository }}" \
              --body "Another **${WORKFLOW}** failure on \`${BRANCH}\` at \`${SHORT_SHA}\`. Run: ${RUN_URL}"
          else
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "CI: ${WORKFLOW} failed on ${BRANCH} (${SHORT_SHA})" \
              --label "ci-failure" \
              --body "**${WORKFLOW}** failed on branch \`${BRANCH}\` at commit \`${SHORT_SHA}\`.

          Run: ${RUN_URL}

          Check the run logs and fix before merging or releasing.

          _Close this issue once the failure is resolved._"
          fi
